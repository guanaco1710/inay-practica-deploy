name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:

  validate-branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^[0-9]+-.*$ ]]; then
            echo "❌ Nombre de rama inválido: '$BRANCH'"
            echo "   El formato requerido es: 1234-descripcion"
            exit 1
          fi
          echo "✅ Nombre de rama válido: $BRANCH"

  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          INVALID=0
          
          while IFS= read -r MSG; do
            echo "Commit: $MSG"
            if [[ ! "$MSG" =~ ^[0-9]+-.* ]]; then
              echo "❌ Formato inválido: '$MSG'"
              echo "   El formato requerido es: 1234-descripcion del cambio"
              INVALID=1
            else
              echo "✅ OK"
            fi
          done < <(git log "$BASE".."$HEAD" --pretty=format:"%s")
          
          if [ "$INVALID" -eq 1 ]; then
            exit 1
          fi

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

  build:
    name: Build project
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 3

